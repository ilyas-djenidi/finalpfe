# --- httpd.conf (vulnerable test) ---
ServerRoot "/usr/local/apache2"
Listen 80

# اسم المضيف/التعريف الكامل للتخمين
ServerName vulnerable.local

# عرض معلومات الخادم (مفيدة للمسّاحين)
ServerTokens Prod
# CyBrain fix [insecure_server_tokens]: was → ServerTokens Full
ServerSignature off

# تحميل الموديولات الأساسية
LoadModule mpm_prefork_module modules/mod_mpm_prefork.so
LoadModule dir_module modules/mod_dir.so
LoadModule alias_module modules/mod_alias.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule ssl_module modules/mod_ssl.so

# DocumentRoot عام قابل للقذف بالملفات
DocumentRoot "/var/www/html"
<Directory "/var/www/html">
    Options -Indexes FollowSymLinks ExecCGI
# CyBrain fix [directory_listing_enabled]: was → Options Indexes FollowSymLinks ExecCGI
    AllowOverride None
# CyBrain fix [allowoverride_enabled]: was → AllowOverride All
    Require all granted
    # السماح بتنفيذ السكربتات CGI (مخاطرة)
    AddHandler cgi-script .cgi .pl .py
</Directory>

# ملف الافتراضات (سمح بفهرسة الدلائل)
<IfModule dir_module>
    DirectoryIndex index.php index.html index.htm
</IfModule>

# VirtualHost ضعيف — لا مصادقة، شهادات قديمة، وتشفير ضعيف
<VirtualHost *:80>
    ServerName vulnerable.local
    DocumentRoot "/var/www/html"
</VirtualHost>

# SSL Section — يسمح ببروتوكولات ضعيفة ومجموعة مفاتيح قديمة
<VirtualHost *:443>
    ServerName vulnerable.local
    DocumentRoot "/var/www/html"
    SSLEngine on
    SSLCertificateFile "/etc/ssl/certs/test-cert.pem"
    SSLCertificateKeyFile "/etc/ssl/private/test-key.pem"

    # السماح ببروتوكولات ضعيفة (مقصود للاختبار)
    SSLProtocol all
    # استخدام مجموعة سيفر ضعيفة تسمح بكثير من الخوارزميات القديمة
    SSLCipherSuite ALL:!aNULL
    SSLHonorCipherOrder On
# CyBrain fix [ssl_honor_cipher_order_off]: was → SSLHonorCipherOrder Off

    <Directory "/var/www/html">
        Options -Indexes FollowSymLinks
# CyBrain fix [directory_listing_enabled]: was → Options Indexes FollowSymLinks
        AllowOverride None
# CyBrain fix [allowoverride_enabled]: was → AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

# تحميل ملف إعدادات إضافي (مثال)
Include conf/extra/httpd-vhosts.conf

# ═══════════════════════════════════════════════════════
# CyBrain Security Fix — Missing Security Directives
# ═══════════════════════════════════════════════════════
# Fix [missing_header_x_frame_options]: رأس HTTP الأمني مفقود: X-Frame-Options
Header always set X-Frame-Options "SAMEORIGIN"
# Fix [missing_header_hsts]: رأس HTTP الأمني مفقود: Strict-Transport-Security (HSTS)
Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
# Fix [missing_header_csp]: رأس HTTP الأمني مفقود: Content-Security-Policy (CSP)
Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'"
# Fix [missing_mod_security]: mod_security (WAF) غير مُفعَّل (CIS L2)
LoadModule security2_module modules/mod_security2.so
SecRuleEngine On
# Fix [missing_max_request_workers]: MaxRequestWorkers غير مُعيَّن
MaxRequestWorkers 400
# Fix [missing_trace_enable]: TraceEnable غير مُعيَّن
TraceEnable Off
# Fix [missing_limit_request_body]: LimitRequestBody غير مُعيَّن (CIS 5.7)
LimitRequestBody 102400
# Fix [missing_header_x_content_type]: رأس HTTP الأمني مفقود: X-Content-Type-Options
Header always set X-Content-Type-Options "nosniff"
# Fix [missing_limit_except]: LimitExcept غير مُعيَّن — HTTP Methods غير مقيّدة
<LimitExcept GET POST HEAD>
    Require all denied
</LimitExcept>
# Fix [missing_error_log]: ErrorLog غير مُعيَّن (CIS 6.1)
ErrorLog "/var/log/httpd/error_log"
# Fix [missing_custom_log]: CustomLog (Access Log) غير مُعيَّن (CIS 6.3)
CustomLog "/var/log/httpd/access_log" combined
# Fix [mpm_prefork_in_use]: MPM prefork مستخدم في بيئة إنتاج
LoadModule mpm_event_module modules/mod_mpm_event.so
# Fix [missing_max_connections_per_child]: MaxConnectionsPerChild غير مُعيَّن
MaxConnectionsPerChild 10000
# Fix [missing_limit_request_line]: LimitRequestLine غير مُعيَّن (CIS 5.4)
LimitRequestLine 8190
# Fix [missing_limit_request_fields]: LimitRequestFields غير مُعيَّن (CIS 5.5)
LimitRequestFields 100
# Fix [missing_limit_request_field_size]: LimitRequestFieldSize غير مُعيَّن (CIS 5.6)
LimitRequestFieldSize 8190
# Fix [missing_header_x_xss]: رأس HTTP الأمني مفقود: X-XSS-Protection
Header always set X-XSS-Protection "1; mode=block"
# Fix [missing_header_referrer_policy]: رأس HTTP الأمني مفقود: Referrer-Policy
Header always set Referrer-Policy "strict-origin-when-cross-origin"
# Fix [missing_keep_alive_timeout]: KeepAliveTimeout غير مُعيَّن (CIS 5.x)
KeepAliveTimeout 15
# Fix [missing_log_level]: LogLevel غير مُعيَّن (CIS 6.2)
LogLevel warn
# Fix [missing_file_etag]: FileETag يتضمن INode بشكل افتراضي (CIS 5.2)
FileETag MTime Size
# Fix [missing_keepalive]: KeepAlive غير مُصرَّح به
KeepAlive On
# Fix [missing_max_keepalive_requests]: MaxKeepAliveRequests غير مُعيَّن
MaxKeepAliveRequests 100
# Fix [missing_mod_deflate]: ضغط المحتوى (mod_deflate) غير مُفعَّل
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json
</IfModule>
# Fix [missing_mod_expires]: Browser caching (mod_expires) غير مُفعَّل
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
</IfModule>
# Fix [missing_logformat_functional]: LogFormat غير مُعرَّف لقياس زمن المعالجة
LogFormat "%h %u %t "%r" %>s %b %D" functional
# Fix [missing_enable_sendfile]: EnableSendfile غير مُصرَّح به
EnableSendfile Off
# Fix [missing_ssl_session_cache]: SSLSessionCache غير مُعيَّن
SSLSessionCache shmcb:/run/httpd/ssl_scache(512000)
# Fix [missing_ssl_session_cache_timeout]: SSLSessionCacheTimeout غير مُعيَّن
SSLSessionCacheTimeout 300