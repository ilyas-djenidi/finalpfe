# Test Configuration File
# هذا الملف يحتوي على إعدادات:
# 1. Indexes معطّل (آمن) ✓
# 2. ExecCGI معطّل (آمن) ✓
# 3. Ciphers محمّية (آمن) ✓

<Directory "/var/www">
    # This is CORRECT - safe configuration
    Options -Indexes -ExecCGI FollowSymLinks SymLinksIfOwnerMatch
</Directory>

<VirtualHost *:443>
    # SSL Configuration - correctly secured
    SSLEngine on
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES:!RC4
    SSLHonorCipherOrder On
</VirtualHost>

# Test case 2: VULNERABLE - should be caught
<Directory "/var/www/upload">
    # This is VULNERABLE - should trigger findings
    Options Indexes ExecCGI FollowSymLinks
</Directory>

# Test case 3: WEAK CIPHER - should be caught if enabled
<VirtualHost *:8443>
    SSLEngine on
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite NULL:RC4:DES:EXPORT
</VirtualHost>
