name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-wtf flask-login flask-limiter flask-cors \
                      bcrypt pyotp requests python-dotenv \
                      google-genai pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Security static check (Bandit)
        run: |
          pip install bandit
          bandit -r . -x .venv,tests,archive_non_runtime -ll
