# ── Dummy Vulnerable Apache Configuration for securAX Testing ──
# DO NOT USE IN PRODUCTION

ServerRoot "/etc/httpd"
Listen 80
Listen 443

# VULNERABILITY 1: ServerTokens reveals OS and compiled modules
ServerTokens Full

# VULNERABILITY 2: ServerSignature appends server version to error pages
ServerSignature On

# VULNERABILITY 3: TraceEnable allows Cross-Site Tracing (XST)
TraceEnable On

# VULNERABILITY 4: Missing HTTP Strict Transport Security (HSTS)
# Header always set Strict-Transport-Security "max-age=63072000; includeSubdomains; preload" (Missing)

# VULNERABILITY 5: Missing X-Frame-Options (Clickjacking risk)
# Header always append X-Frame-Options SAMEORIGIN (Missing)

# VULNERABILITY 6: Missing Content Security Policy (CSP)
# Header set Content-Security-Policy "default-src 'self';" (Missing)

<Directory "/var/www/html">
    # VULNERABILITY 7: Directory indexing is enabled, exposing files
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# VULNERABILITY 8: Weak SSL/TLS configuration
SSLEngine on
SSLProtocol all -SSLv2 -SSLv3
# Notice: TLSv1 and TLSv1.1 are still enabled here (Insecure)
SSLCipherSuite HIGH:MEDIUM:!aNULL:!MD5

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
