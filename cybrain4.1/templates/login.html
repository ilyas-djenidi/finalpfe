    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--sp-xl);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: var(--sp-4xl);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s ease both;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
        }
        .login-title {
            font-family: var(--font-display);
            font-size: var(--fs-2xl);
            color: var(--accent-cyan);
            letter-spacing: 4px;
            margin-bottom: var(--sp-xs);
        }
        .login-sub {
            font-family: var(--font-mono);
            font-size: var(--fs-xs);
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-bottom: var(--sp-3xl);
        }
        .login-field { margin-bottom: var(--sp-xl); }
        .login-input {
            width: 100%;
            background: rgba(0,0,0,0.40);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: var(--fs-md);
            padding: 12px var(--sp-lg);
            transition: var(--transition-base);
            letter-spacing: 1px;
            direction: ltr;
        }
        .login-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }
        .login-input::placeholder { color: rgba(74,122,138,0.5); }
        .login-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-family: var(--font-display);
            font-size: var(--fs-lg);
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 14px;
            cursor: pointer;
            transition: var(--transition-base);
            overflow: hidden;
            position: relative;
            margin-top: var(--sp-md);
        }
        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent-cyan);
            transform: translateX(-101%);
            transition: var(--transition-slow);
        }
        .login-btn:hover::before { transform: translateX(0); }
        .login-btn:hover { color: var(--bg-primary); box-shadow: var(--glow-cyan); }
        .login-btn span { position: relative; z-index: 1; }
        .flash-messages { margin-bottom: var(--sp-xl); }
        .flash-msg {

            align-items: center;
            gap: var(--sp-sm);
            padding: 10px var(--sp-md);
            border: 1px solid var(--accent-red);

            color: var(--accent-red);
