[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # VITE_API_BASE_URL is set in .env.production (committed) and can be
  # overridden via Netlify UI → Site Settings → Environment Variables.
  # Set it to your Render backend URL, e.g.:
  #   VITE_API_BASE_URL = https://securax-backend-i75y.onrender.com
